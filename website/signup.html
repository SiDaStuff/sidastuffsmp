<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — SiDaStuff SMP</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-brand">
        <img src="assets/logo.png" alt="Logo" class="nav-logo" id="navLogo">
        <span>SiDaStuff SMP</span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="auth-subtitle">Join the SiDaStuff SMP community</p>
      <form id="signupForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6">
        </div>
        <div class="form-error" id="signupError" style="display:none;"></div>
        <button type="submit" class="btn btn-primary btn-full">Sign Up</button>
      </form>
      <p class="auth-footer">Already have an account? <a href="/login.html">Log in</a></p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 SiDaStuff SMP. All rights reserved.</p>
  </footer>

  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
